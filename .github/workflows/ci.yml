# CI — roda em PRs + pushes pra main.
#
# Lição do PR #4 (visual redesign, mergeado em 2026-05-14): o PR mergeou com 66
# classes Tailwind quebradas em produção (sed cego deixou `bg-status-*-bg0` em
# vez de `bg-status-*-bg`). Build NUNCA rodou antes do merge. Este workflow
# garante que isso não repita.
#
# Decisões de bloqueio:
# - typecheck (tsc --noEmit -p tsconfig.app.json): blocking — qualquer regressão
#   de tipos no src/ quebra o PR. ⚠️ Tem que ser `-p tsconfig.app.json`, NÃO o
#   `tsc --noEmit` cru: o tsconfig.json root usa `"files": []` + `"references"`,
#   e em modo não-build o tsc ignora as references e checa só o `files` (vazio)
#   → no-op que não type-checava o src de jeito nenhum. Isso deixou passar 2
#   TS2741 reais (#325 KpiCards.test.tsx, #345 FinanceiroFunding.tsx), só pegos
#   pelo Lovable. `-p tsconfig.app.json` checa src+testes de verdade.
#   ✅ CONVERGÊNCIA STRICT (2026-05-30): o `tsconfig.app.json` agora é `strict: true`
#   (+ noImplicitAny/strictNullChecks/noUnusedLocals/noUnusedParameters/
#   noFallthroughCasesInSwitch). O `tsconfig.strict.json` paralelo foi DELETADO e o
#   2º passo de typecheck removido — este passo único agora é o gate strict de TODO
#   o src + testes. A migração incremental (539→855 files) está concluída.
# - test (vitest run): blocking — regressão de comportamento documentado
# - build (vite build): blocking — pega Tailwind quebrado + import errors + PWA setup
# - lint (eslint): blocking em ERRORS — a dívida de `no-explicit-any` foi zerada
#   (era ~1300 errors, hoje 0; ver CLAUDE.md §10/§13), então o lint virou gate
#   real (2026-05-26). O que importa: a regra de segurança `no-restricted-syntax`
#   (anti-injeção PostgREST `.or()`, nível error, escopo src/ — eslint.config.js)
#   agora BLOQUEIA o PR de verdade; antes, com `continue-on-error`, um `.or()` cru
#   reintroduzido passava silencioso. WARNINGS (hoje 82, todos
#   react-hooks/exhaustive-deps) seguem NÃO-bloqueantes de propósito (eslint só
#   falha em error) — evita fricção no repo multi-sessão. Ratchet de warnings
#   (--max-warnings N) fica como follow-up se a contagem começar a crescer.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      # ─── Blocking checks ────────────────────────────────────────────
      - name: Type check (strict — todo o src + testes)
        run: bunx tsc --noEmit -p tsconfig.app.json

      - name: Tests
        run: bun run test

      - name: Build
        run: bun run build
        env:
          # Build precisa do mesmo ambiente que Lovable produção.
          # Se algum VITE_* for required no futuro, adicionar aqui.
          NODE_ENV: production

      # Bloqueia em errors (0 hoje); warnings não falham (eslint default).
      - name: Lint
        run: bun lint
