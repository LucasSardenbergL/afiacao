# CI — roda em PRs + pushes pra main.
#
# Lição do PR #4 (visual redesign, mergeado em 2026-05-14): o PR mergeou com 66
# classes Tailwind quebradas em produção (sed cego deixou `bg-status-*-bg0` em
# vez de `bg-status-*-bg`). Build NUNCA rodou antes do merge. Este workflow
# garante que isso não repita.
#
# Decisões de bloqueio:
# - typecheck (tsc --noEmit -p tsconfig.app.json): blocking — qualquer regressão
#   de tipos no src/ quebra o PR. ⚠️ Tem que ser `-p tsconfig.app.json`, NÃO o
#   `tsc --noEmit` cru: o tsconfig.json root usa `"files": []` + `"references"`,
#   e em modo não-build o tsc ignora as references e checa só o `files` (vazio)
#   → no-op que não type-checava o src de jeito nenhum. Isso deixou passar 2
#   TS2741 reais (#325 KpiCards.test.tsx, #345 FinanceiroFunding.tsx), só pegos
#   pelo Lovable. `-p tsconfig.app.json` checa src+testes de verdade.
#   ✅ CONVERGÊNCIA STRICT (2026-05-30): o `tsconfig.app.json` agora é `strict: true`
#   (+ noImplicitAny/strictNullChecks/noUnusedLocals/noUnusedParameters/
#   noFallthroughCasesInSwitch). O `tsconfig.strict.json` paralelo foi DELETADO e o
#   2º passo de typecheck removido — este passo único agora é o gate strict de TODO
#   o src + testes. A migração incremental (539→855 files) está concluída.
# - test (vitest run): blocking — regressão de comportamento documentado
# - build (vite build): blocking — pega Tailwind quebrado + import errors + PWA setup
# - lint (eslint): blocking em ERRORS — a dívida de `no-explicit-any` foi zerada
#   (era ~1300 errors, hoje 0; ver CLAUDE.md §10/§13), então o lint virou gate
#   real (2026-05-26). O que importa: a regra de segurança `no-restricted-syntax`
#   (anti-injeção PostgREST `.or()`, nível error, escopo src/ — eslint.config.js)
#   agora BLOQUEIA o PR de verdade; antes, com `continue-on-error`, um `.or()` cru
#   reintroduzido passava silencioso. WARNINGS (hoje 82, todos
#   react-hooks/exhaustive-deps) seguem NÃO-bloqueantes de propósito (eslint só
#   falha em error) — evita fricção no repo multi-sessão. Ratchet de warnings
#   (--max-warnings N) fica como follow-up se a contagem começar a crescer.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # issues:write p/ o alerta de main-vermelha (abaixo) abrir Issue; contents:read p/ checkout.
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v5

      # ⚠️ bun-version tem que ser semver ESTRITO (x.y.z) — NÃO `latest`, `1.3`,
      # `^1.3.14` nem `1.3.x` (o exemplo da doc do input!). Só o estrito casa o
      # `validateStrict()` da action (src/download-url.ts) e pula a chamada a
      # api.github.com/repos/oven-sh/bun/git/refs/tags; qualquer outro formato cai
      # nela e reintroduz a dependência de rede no caminho de entrega. Com
      # `latest` a action também desliga o cache de propósito (isCacheEnabled).
      # Lição de 2026-07-16: incidente "Degraded REST API Availability" do GitHub
      # (~35% das chamadas REST falhando) derrubou TODO PR do repo em ~6s no setup
      # do bun — inclusive PRs de 1 linha de markdown. Bump: conferir `bun --version`
      # local e alinhar aqui (as duas ocorrências) + no job mutation-check.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install deps
        run: bun install --frozen-lockfile

      # ─── Blocking checks ────────────────────────────────────────────
      - name: Type check (strict — todo o src + testes)
        run: bunx tsc --noEmit -p tsconfig.app.json

      - name: Tests
        run: bun run test

      - name: Build
        run: bun run build
        env:
          # Build precisa do mesmo ambiente que Lovable produção.
          # Se algum VITE_* for required no futuro, adicionar aqui.
          NODE_ENV: production

      # Bloqueia em errors (0 hoje); warnings não falham (eslint default).
      - name: Lint
        run: bun lint

      # Anti-inchaço do CLAUDE.md (carregado em toda sessão+subagente). Teto
      # apertado (20 KB / 2,6k palavras / linha ≤2000c) vs ~13 KB pós-refactor
      # da frente 1 (2026-06-15). Estourar = mover a lição pra docs/agent/ e o
      # histórico pra docs/historico/ (ver topo do CLAUDE.md). Ver scripts/check-claude-md-budget.sh.
      - name: CLAUDE.md size budget
        run: bun run claude:size

      # Anti-regressão de gate de autorização em RPCs SECURITY DEFINER sensíveis (custo/preço/
      # estoque). Mata o padrão "CREATE OR REPLACE derrubou o gate" — 3 ocorrências (5 views #1246,
      # get_tint_prices, fin_estimar_estoque_omie #1264). Estático: lê supabase/migrations/ no
      # estado final (last-writer-wins), sem Postgres. Parte A (regressão) + Parte B (cobertura).
      # Manifest: scripts/authz-manifest.ts. Spec: docs/superpowers/specs/2026-07-09-authz-gate-regression-check-design.md
      - name: Authz gate check (RPCs SECDEF sensíveis)
        run: bun run authz:check

      # Anti-regressão do pin do bun (follow-up do PR #1352). Prova que TODO `bun-version` é semver
      # ESTRITO x.y.z e que as ocorrências convergem — as 3 armadilhas do comentário lá em cima.
      # Existe porque a regressão é INVISÍVEL: com `latest` (ou `1.3`/`1.3.x`/`bun-v1.3.15`) a action
      # cai na api.github.com, o CI fica VERDE, e o SPOF só aparece quando a API do GitHub degrada —
      # como em 2026-07-16, que matou todo PR do repo em ~6s. Comentário não barra ninguém e todo PR
      # não-draft auto-mergeia no verde. Estático: lê .github/workflows/, sem rede.
      - name: Bun pin gate check (semver estrito x.y.z)
        run: bun run bunpin:check

      # ─── Alerta de regressão (Componente 1 — mitigação de reversão Lovable) ──
      # O bot do Lovable commita DIRETO na main sem PR/CI; quando quebra build/
      # typecheck (ex.: types.ts stale #1079), o CI fica vermelho mas passa
      # SILENCIOSO (ninguém olha). Este step abre/atualiza uma Issue p/ o sinal
      # chegar ao founder. Só na main — em PR o autor já vê o vermelho. Spec:
      # docs/superpowers/specs/2026-06-26-lovable-revert-mitigation-design.md
      - name: Alerta de main vermelha → GitHub Issue
        if: failure() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner, repo = context.repo.repo;
            const sha = context.sha.slice(0, 8);
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const head = context.payload.head_commit || {};
            const msg = (head.message || '').split('\n')[0];
            const author = (head.author && head.author.name) || context.actor;
            const label = 'ci-main-red';
            try {
              await github.rest.issues.createLabel({ owner, repo, name: label, color: 'd73a4a', description: 'CI da main quebrado por push direto (sem PR)' });
            } catch (e) { /* label já existe */ }
            const body = [
              '🔴 **CI da `main` falhou.**',
              '',
              `- Commit: \`${sha}\` — ${msg}`,
              `- Autor: ${author}`,
              `- Run: ${runUrl}`,
              '',
              'Provável reversão por commit direto do Lovable (sem PR/CI). Restauração rápida: `docs/agent/deploy.md`.',
            ].join('\n');
            const open = await github.rest.issues.listForRepo({ owner, repo, state: 'open', labels: label, per_page: 1 });
            if (open.data.length > 0) {
              await github.rest.issues.createComment({ owner, repo, issue_number: open.data[0].number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title: '🔴 CI vermelho na main', body, labels: [label] });
            }

      # Fase 2 do Componente 1: quando a main VOLTA a verde, fecha a(s) Issue(s)
      # ci-main-red abertas (senão a Issue fica órfã e o sinal perde valor). Idempotente:
      # sem Issue aberta = no-op. success() é false se qualquer step do job falhou.
      - name: main voltou a verde → fecha Issue ci-main-red
        if: success() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner, repo = context.repo.repo;
            const sha = context.sha.slice(0, 8);
            const label = 'ci-main-red';
            const open = await github.rest.issues.listForRepo({ owner, repo, state: 'open', labels: label, per_page: 100 });
            for (const issue of open.data) {
              await github.rest.issues.createComment({ owner, repo, issue_number: issue.number, body: `✅ CI da \`main\` voltou a verde em \`${sha}\`. Fechando automaticamente.` });
              await github.rest.issues.update({ owner, repo, issue_number: issue.number, state: 'closed' });
            }

  # ─── Job NÃO-bloqueante (informativo, sinal próprio) ────────────────
  # Gate de regressão de COBERTURA money-path (≠ os checks do `validate`, que
  # cobrem tipos/comportamento/build/lint). Roda os contratos scripts/mutcheck.d/*.mut
  # via scripts/mutcheck.sh — mutation-check: um teste só vale se FALHA quando a
  # invariante é violada (plantamos o bug, medimos se a suíte o mata).
  # ⚠️ NÃO é required na branch protection POR ORA: os .mut casam TEXTO EXATO do
  # helper, então um refactor legítimo pode dessincronizá-los (INVÁLIDO) e travaria
  # PRs alheias num repo multi-sessão. Promova a required (igual ao lint) quando os
  # .mut amadurecerem. `--selftest` valida a própria ferramenta. Ver CLAUDE.md §13.
  mutation-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      # Semver estrito, mesmo motivo do job `validate` acima (manter as duas em sincronia).
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: mutcheck — selftest (mecânica da ferramenta, sem vitest)
        run: bun run mutcheck:selftest

      - name: mutcheck — contratos de cobertura money-path (.mut)
        run: bun run mutcheck
