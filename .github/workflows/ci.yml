# CI — roda em PRs + pushes pra main.
#
# Lição do PR #4 (visual redesign, mergeado em 2026-05-14): o PR mergeou com 66
# classes Tailwind quebradas em produção (sed cego deixou `bg-status-*-bg0` em
# vez de `bg-status-*-bg`). Build NUNCA rodou antes do merge. Este workflow
# garante que isso não repita.
#
# Decisões de bloqueio:
# - typecheck (tsc --noEmit -p tsconfig.app.json): blocking — qualquer regressão
#   de tipos no src/ quebra o PR. ⚠️ Tem que ser `-p tsconfig.app.json`, NÃO o
#   `tsc --noEmit` cru: o tsconfig.json root usa `"files": []` + `"references"`,
#   e em modo não-build o tsc ignora as references e checa só o `files` (vazio)
#   → no-op que não type-checava o src de jeito nenhum. Isso deixou passar 2
#   TS2741 reais (#325 KpiCards.test.tsx, #345 FinanceiroFunding.tsx), só pegos
#   pelo Lovable. `-p tsconfig.app.json` checa src+testes de verdade.
#   ✅ CONVERGÊNCIA STRICT (2026-05-30): o `tsconfig.app.json` agora é `strict: true`
#   (+ noImplicitAny/strictNullChecks/noUnusedLocals/noUnusedParameters/
#   noFallthroughCasesInSwitch). O `tsconfig.strict.json` paralelo foi DELETADO e o
#   2º passo de typecheck removido — este passo único agora é o gate strict de TODO
#   o src + testes. A migração incremental (539→855 files) está concluída.
# - test (vitest run): blocking — regressão de comportamento documentado. ⚠️ Cobre só `src/**` +
#   `scripts/**` (o `include` do vitest.config.ts) — NÃO as edge functions, que são Deno.
# - test:edges (deno test --no-remote): blocking — os 119 testes das edge functions. Rodavam em
#   lugar NENHUM até 2026-07-18: existiam no repo, com script pronto no package.json, e o CI nunca
#   os chamou. Detalhe (inclusive por que NÃO existe um gate de pin do deno) no próprio step.
# - edges:typecheck (deno check): blocking — type-check dos 93 `index.ts` de edge. O `test:edges`
#   acima NÃO cobre isso: `deno test` só type-checa o grafo que os testes alcançam, e nenhum
#   `index.ts` é importado por teste algum. Até 2026-07-21 erro de tipo em edge passava VERDE em
#   todos os gates e só quebrava em RUNTIME na produção (#1498). Único step do job que precisa de
#   REDE; o porquê disso ser inevitável aqui está no próprio step.
# - build (vite build): blocking — pega Tailwind quebrado + import errors + PWA setup
# - lint (eslint): blocking em ERRORS — a dívida de `no-explicit-any` foi zerada
#   (era ~1300 errors, hoje 0; ver CLAUDE.md §10/§13), então o lint virou gate
#   real (2026-05-26). O que importa: a regra de segurança `no-restricted-syntax`
#   (anti-injeção PostgREST `.or()`, nível error, escopo src/ — eslint.config.js)
#   agora BLOQUEIA o PR de verdade; antes, com `continue-on-error`, um `.or()` cru
#   reintroduzido passava silencioso. WARNINGS (hoje 82, todos
#   react-hooks/exhaustive-deps) seguem NÃO-bloqueantes de propósito (eslint só
#   falha em error) — evita fricção no repo multi-sessão. Ratchet de warnings
#   (--max-warnings N) fica como follow-up se a contagem começar a crescer.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Validação PERIÓDICA da main — tapa a única janela que `pull_request`+`push` não cobrem.
  #
  # O buraco: merge de PR NÃO dispara o CI na main. Medido em 2026-07-21 (`gh run list --limit 60`):
  # TODO run com `event=push` é commit DIRETO do bot do Lovable; nenhum merge de PR (#1503/#1505/
  # #1506/#1507) gerou run de push. Causa: o auto-merge.yml usa `secrets.GITHUB_TOKEN`, e pela
  # proteção anti-loop do GitHub eventos disparados por esse token não acionam workflows. Ou seja, o
  # `push:` acima só pega a via do Lovable.
  #
  # Por que isso importa: dois PRs verdes ISOLADAMENTE podem quebrar a main JUNTOS (semantic
  # conflict) e ninguém saber. Ex. concreto com o `edges:typecheck`: PR A remove um export de
  # `supabase/functions/_shared/`, PR B adiciona um import dele — cada um passa, juntos dão TS2305.
  # Com ~30 worktrees paralelas e ~8 PRs mergeados por sessão, não é hipotético. Pior: o sintoma
  # aparece no lugar errado — o PRÓXIMO PR falha por algo que o autor não causou.
  #
  # Por que `schedule` e não PAT/merge-queue: evento `schedule` roda SEMPRE no default branch, então
  # `github.ref` já é `refs/heads/main` e os dois steps de alerta lá embaixo
  # (`if: failure() && github.ref == 'refs/heads/main'` / `success() && ...`) passam a cobrir esta
  # via SEM alteração — abrem e fecham a Issue `ci-main-red` sozinhos. Trocar o token do auto-merge
  # por um PAT/App faria o push disparar o CI, mas custa gerenciar credencial e um run de ~5min por
  # merge; merge queue resolve melhor (valida a combinação ANTES da main) mas muda o fluxo do repo
  # inteiro. Diário é o piso útil: pega o conflito no dia seguinte por ~150 min/mês de Actions.
  #
  # Horário: 09:17 UTC ≈ 06:17 BRT — o founder começa o dia com o sinal, e o minuto quebrado evita a
  # fila de crons "redondos" do GitHub (que atrasa muito em :00). ⚠️ O GitHub DESABILITA cron após
  # 60 dias sem atividade no repo; se o repo hibernar, reativar na aba Actions.
  schedule:
    - cron: '17 9 * * *'
  # Botão "validar a main agora" (aba Actions → CI → Run workflow), sem esperar as 09:17. Serve para
  # (a) confirmar a main na hora depois de uma leva de merges, e (b) VERIFICAR este próprio desenho:
  # como `workflow_dispatch` na main também dá `github.ref == 'refs/heads/main'`, ele exercita os
  # mesmos dois steps de alerta que o `schedule` vai exercitar — sem isso, a primeira prova de que a
  # Issue abre/fecha só viria no primeiro cron.
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # issues:write p/ o alerta de main-vermelha (abaixo) abrir Issue; contents:read p/ checkout.
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v5

      # ⚠️ bun-version tem que ser semver ESTRITO (x.y.z) — NÃO `latest`, `1.3`,
      # `^1.3.14` nem `1.3.x` (o exemplo da doc do input!). Só o estrito casa o
      # `validateStrict()` da action (src/download-url.ts) e pula a chamada a
      # api.github.com/repos/oven-sh/bun/git/refs/tags; qualquer outro formato cai
      # nela e reintroduz a dependência de rede no caminho de entrega. Com
      # `latest` a action também desliga o cache de propósito (isCacheEnabled).
      # Lição de 2026-07-16: incidente "Degraded REST API Availability" do GitHub
      # (~35% das chamadas REST falhando) derrubou TODO PR do repo em ~6s no setup
      # do bun — inclusive PRs de 1 linha de markdown. Bump: conferir `bun --version`
      # local e alinhar aqui (as duas ocorrências) + no job mutation-check.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install deps
        run: bun install --frozen-lockfile

      # ─── Blocking checks ────────────────────────────────────────────
      - name: Type check (strict — todo o src + testes)
        run: bunx tsc --noEmit -p tsconfig.app.json

      - name: Tests
        run: bun run test

      # Testes das EDGE FUNCTIONS (Deno) — blocking. Os 119 testes em
      # supabase/functions/**/*_test.ts existiam com script pronto (`test:edges`) e NADA no CI os
      # rodava: o `bun run test` acima é vitest, cujo `include` (vitest.config.ts) é só `src/**` +
      # `scripts/**`. Eram documentação executável, não guarda de regressão — um PR podia quebrá-los
      # com o CI VERDE e, como todo PR não-draft auto-mergeia no verde, a regressão entrava sozinha.
      # Motivador concreto: os invariantes de CUSTO de _shared/relatorio-mensal_test.ts existem pra
      # impedir que o N+1 de ~5.285 consultas volte (PR #1432) — e hoje não impediriam nada.
      # Custo: ~0,6s de teste; o setup do Deno domina. Roda DEPOIS de typecheck+vitest de propósito
      # (PR quebrado no comum falha antes, sem pagar o setup).
      #
      # ⚠️ NÃO espelhar aqui o gate `bunpin:check`: o raciocínio do pin do bun NÃO transfere. A
      # `oven-sh/setup-bun` só PULA a api.github.com quando o valor casa `validateStrict()` — é ISSO
      # que o gate protege. A `denoland/setup-deno` não tem esse fast-path: com `2.9.2` ela cai em
      # resolveRelease(range) → fetch `dl.deno.land/versions.json`; com `latest`, em
      # `release-latest.txt`. Mesma rede nos dois casos → um gate espelhado não removeria UM request
      # sequer, só daria falsa segurança. O pin estrito aqui é por REPRODUTIBILIDADE (o runtime não
      # muda sozinho num PR alheio), não anti-SPOF. Bump: conferir `deno --version` e alinhar.
      #
      # O `--no-remote` (dentro de `test:edges`) é a invariante que substitui aquele gate: prova que
      # a suíte é 100% OFFLINE, mantendo jsr.io/npm FORA do caminho de entrega de todo PR — a mesma
      # forma do incidente de 2026-07-16. Ele foi introduzido junto com a troca do `jsr:@std/assert@1`
      # de omie-sync-status-produtos/paginacao.test.ts (único dos 11 arquivos fora do padrão) por
      # helper local. Consequência a saber: teste de edge que precise de `npm:`/`jsr:` NÃO roda aqui
      # — a saída é extrair a lógica PURA e testar ela (o que os 11 arquivos já fazem), não afrouxar
      # o flag.
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.9.2

      - name: Tests (edge functions — Deno, offline)
        run: bun run test:edges

      # Type-check das EDGE FUNCTIONS — blocking. Buraco que ficou aberto mesmo depois do
      # `test:edges` acima: `deno test` só type-checa o grafo que os TESTES alcançam, e por desenho
      # os testes cobrem lógica PURA extraída (justamente para caber no `--no-remote`), então
      # NENHUM `index.ts` de edge entra no grafo. Somado a `typecheck` (só src/) e `lint` (não
      # type-checa Deno), erro de tipo numa edge ficava VERDE em TODOS os gates e só quebrava em
      # RUNTIME na produção, depois do deploy manual pelo chat do Lovable. Detectado no PR #1498:
      # `classifyProfile` usado sem estar no import passou por 5.527 testes vitest, 181 testes deno,
      # typecheck e lint — só apareceu num `deno check` manual.
      #
      # ⚠️ Este step PRECISA de rede, ao contrário do `test:edges` — não dá para espelhar o
      # `--no-remote` aqui: as edges importam `npm:`/`https://` de verdade e o check resolve o grafo
      # todo (2.245 downloads, ~48s cold / ~2,5s warm). Mitigação do que dá: dos 3 hosts,
      # `registry.npmjs.org` (2.087 requests) JÁ está no caminho de entrega via `bun install`; os
      # novos são `esm.sh` (135) e `deno.land` (23), ambos de import legado — 34 edges em
      # `deno.land/std/http/server.ts` (o `Deno.serve` nativo substitui) e 18 em
      # `esm.sh/@supabase/supabase-js` (tem equivalente `npm:`). Migrar as duas famílias zera os
      # hosts novos: é o follow-up 2 do spec.
      #
      # Sem `actions/cache` de propósito: o DENO_DIR fica em 681 MB (677 de tarballs npm) e
      # economizaria ~30s dos 48s consumindo ~7% do budget de 10 GB do repo, mais drift de chave —
      # e não há `deno.lock` versionado (está no .gitignore) para chavear. Roda DEPOIS de
      # typecheck+vitest+test:edges pelo mesmo motivo que o `test:edges`: PR quebrado no comum falha
      # antes de pagar a rede.
      #
      # O gate é de PRECISÃO, não de recall: falha só nas 6 classes de "símbolo/módulo não resolve"
      # (a do #1498), que hoje estão em ZERO nas 93 edges — por isso não precisa de allowlist. As
      # outras 141 (dívida de tipos gerados do Supabase) são reportadas sem falhar. O porquê da
      # escolha, os números e os follow-ups estão no cabeçalho do script e no spec:
      # docs/superpowers/specs/2026-07-21-edges-typecheck-gate-design.md
      - name: Type check (edge functions — Deno)
        run: bun run edges:typecheck

      - name: Build
        run: bun run build
        env:
          # Build precisa do mesmo ambiente que Lovable produção.
          # Se algum VITE_* for required no futuro, adicionar aqui.
          NODE_ENV: production

      # Bloqueia em errors (0 hoje); warnings não falham (eslint default).
      - name: Lint
        run: bun lint

      # Anti-inchaço do CLAUDE.md (carregado em toda sessão+subagente). Teto
      # apertado (20 KB / 2,6k palavras / linha ≤2000c) vs ~13 KB pós-refactor
      # da frente 1 (2026-06-15). Estourar = mover a lição pra docs/agent/ e o
      # histórico pra docs/historico/ (ver topo do CLAUDE.md). Ver scripts/check-claude-md-budget.sh.
      - name: CLAUDE.md size budget
        run: bun run claude:size

      # Anti-regressão de gate de autorização em RPCs SECURITY DEFINER sensíveis (custo/preço/
      # estoque). Mata o padrão "CREATE OR REPLACE derrubou o gate" — 3 ocorrências (5 views #1246,
      # get_tint_prices, fin_estimar_estoque_omie #1264). Estático: lê supabase/migrations/ no
      # estado final (last-writer-wins), sem Postgres. Parte A (regressão) + Parte B (cobertura).
      # Manifest: scripts/authz-manifest.ts. Spec: docs/superpowers/specs/2026-07-09-authz-gate-regression-check-design.md
      - name: Authz gate check (RPCs SECDEF sensíveis)
        run: bun run authz:check

      # Anti-regressão do pin do bun (follow-up do PR #1352). Prova que TODO `bun-version` é semver
      # ESTRITO x.y.z e que as ocorrências convergem — as 3 armadilhas do comentário lá em cima.
      # Existe porque a regressão é INVISÍVEL: com `latest` (ou `1.3`/`1.3.x`/`bun-v1.3.15`) a action
      # cai na api.github.com, o CI fica VERDE, e o SPOF só aparece quando a API do GitHub degrada —
      # como em 2026-07-16, que matou todo PR do repo em ~6s. Comentário não barra ninguém e todo PR
      # não-draft auto-mergeia no verde. Estático: lê .github/workflows/, sem rede.
      - name: Bun pin gate check (semver estrito x.y.z)
        run: bun run bunpin:check

      # ─── Alerta de regressão (Componente 1 — mitigação de reversão Lovable) ──
      # O bot do Lovable commita DIRETO na main sem PR/CI; quando quebra build/
      # typecheck (ex.: types.ts stale #1079), o CI fica vermelho mas passa
      # SILENCIOSO (ninguém olha). Este step abre/atualiza uma Issue p/ o sinal
      # chegar ao founder. Só na main — em PR o autor já vê o vermelho. Spec:
      # docs/superpowers/specs/2026-06-26-lovable-revert-mitigation-design.md
      - name: Alerta de main vermelha → GitHub Issue
        if: failure() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner, repo = context.repo.repo;
            const sha = context.sha.slice(0, 8);
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const head = context.payload.head_commit || {};
            const msg = (head.message || '').split('\n')[0];
            const author = (head.author && head.author.name) || context.actor;
            const label = 'ci-main-red';
            try {
              await github.rest.issues.createLabel({ owner, repo, name: label, color: 'd73a4a', description: 'CI da main quebrado por push direto (sem PR)' });
            } catch (e) { /* label já existe */ }
            const body = [
              '🔴 **CI da `main` falhou.**',
              '',
              `- Commit: \`${sha}\` — ${msg}`,
              `- Autor: ${author}`,
              `- Run: ${runUrl}`,
              '',
              'Provável reversão por commit direto do Lovable (sem PR/CI). Restauração rápida: `docs/agent/deploy.md`.',
            ].join('\n');
            const open = await github.rest.issues.listForRepo({ owner, repo, state: 'open', labels: label, per_page: 1 });
            if (open.data.length > 0) {
              await github.rest.issues.createComment({ owner, repo, issue_number: open.data[0].number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title: '🔴 CI vermelho na main', body, labels: [label] });
            }

      # Fase 2 do Componente 1: quando a main VOLTA a verde, fecha a(s) Issue(s)
      # ci-main-red abertas (senão a Issue fica órfã e o sinal perde valor). Idempotente:
      # sem Issue aberta = no-op. success() é false se qualquer step do job falhou.
      - name: main voltou a verde → fecha Issue ci-main-red
        if: success() && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner, repo = context.repo.repo;
            const sha = context.sha.slice(0, 8);
            const label = 'ci-main-red';
            const open = await github.rest.issues.listForRepo({ owner, repo, state: 'open', labels: label, per_page: 100 });
            for (const issue of open.data) {
              await github.rest.issues.createComment({ owner, repo, issue_number: issue.number, body: `✅ CI da \`main\` voltou a verde em \`${sha}\`. Fechando automaticamente.` });
              await github.rest.issues.update({ owner, repo, issue_number: issue.number, state: 'closed' });
            }

  # ─── Job NÃO-bloqueante (informativo, sinal próprio) ────────────────
  # Gate de regressão de COBERTURA money-path (≠ os checks do `validate`, que
  # cobrem tipos/comportamento/build/lint). Roda os contratos scripts/mutcheck.d/*.mut
  # via scripts/mutcheck.sh — mutation-check: um teste só vale se FALHA quando a
  # invariante é violada (plantamos o bug, medimos se a suíte o mata).
  # ⚠️ NÃO é required na branch protection POR ORA: os .mut casam TEXTO EXATO do
  # helper, então um refactor legítimo pode dessincronizá-los (INVÁLIDO) e travaria
  # PRs alheias num repo multi-sessão. Promova a required (igual ao lint) quando os
  # .mut amadurecerem. `--selftest` valida a própria ferramenta. Ver CLAUDE.md §13.
  mutation-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # FORA do `schedule` de propósito. O run diário existe para provar que a main passa nos gates
    # BLOQUEANTES; este job é informativo, não-required, e pode ficar INVÁLIDO por refactor legítimo
    # (ver o comentário acima). Rodando diário ele falharia sem abrir Issue nenhuma — os dois steps
    # de alerta vivem no job `validate` —, virando exatamente o sinal vermelho que ninguém lê. Além
    # de somar ~2m41s por dia sem leitor. Nos eventos de PR/push segue rodando igual.
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v5

      # Semver estrito, mesmo motivo do job `validate` acima (manter as duas em sincronia).
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: mutcheck — selftest (mecânica da ferramenta, sem vitest)
        run: bun run mutcheck:selftest

      - name: mutcheck — contratos de cobertura money-path (.mut)
        run: bun run mutcheck
